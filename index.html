<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ray Puzzle Game - Base</title>
    <style>
        :root {
            --bg-color: #0c0f12;
            --text-color: #00ffcc;
            --panel-bg: #161b22;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            user-select: none;
        }

        h1 { margin: 15px 0 5px; font-size: 24px; text-shadow: 0 0 10px var(--text-color); }

        .container {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        #game-wrapper {
            position: relative;
            background-color: #000;
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }

        canvas { display: block; }

        .sidebar {
            width: 260px;
            background: var(--panel-bg);
            border: 1px solid #333;
            padding: 15px;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .rule-box {
            background: rgba(0, 255, 204, 0.05);
            border-left: 4px solid var(--text-color);
            padding: 10px;
            margin-bottom: 15px;
            font-size: 13px;
            line-height: 1.4;
        }

        .controls { color: #aaa; font-size: 12px; margin-top: 15px; line-height: 1.5; }

        .btn {
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
        }
        .btn:hover { background: #fff; }

        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            z-index: 10;
        }
        #gameover { background: rgba(255, 0, 0, 0.4); }
        #gameclear { background: rgba(0, 255, 204, 0.4); }

        .overlay h2 { font-size: 36px; margin: 0 0 10px; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .overlay p { margin: 0 0 20px; }
        .overlay button {
            padding: 10px 20px;
            cursor: pointer;
            background: #fff;
            border: none;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>
<body>

    <h1>Ray Puzzle Game</h1>

    <div class="container">
        <div id="game-wrapper">
            <canvas id="gameCanvas" width="540" height="540"></canvas>
            
            <div id="gameover" class="overlay">
                <h2>GAME OVER</h2>
                <p>光が壁に衝突しました</p>
                <button class="btn-restart">RETRY</button>
            </div>

            <div id="gameclear" class="overlay">
                <h2 style="color: #00ffcc;">STAGE CLEAR</h2>
                <p>見事に光をゴールへ導きました！</p>
                <button class="btn-restart">PLAY AGAIN</button>
            </div>
        </div>

        <div class="sidebar">
            <div>
                <div class="rule-box">
                    【ミッション】<br>
                    左上の<b>[START]</b>から放たれる光を、壁にぶつけずに右下の<b>[GOAL]</b>まで運んでください。
                </div>
                
                <div class="controls">
                    <b>[操作方法]</b><br>
                    ・<b>左クリック</b>: 鏡 [ ／ ] を配置<br>
                    ・<b>右クリック</b>: 鏡 [ ＼ ] を配置<br>
                    ・同じマスをもう一度クリックで消去
                </div>
            </div>
            
            <button id="btn-start" class="btn">LAUNCH RAY</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const btnStart = document.getElementById('btn-start');
        const gameoverScreen = document.getElementById('gameover');
        const gameclearScreen = document.getElementById('gameclear');
        const restartButtons = document.querySelectorAll('.btn-restart');

        // グリッド定数
        const COLS = 15;
        const ROWS = 15;
        const SIZE = 36; // 15 * 36 = 540
        
        // 固定パラメーター
        const RAY_SPEED = 3.0; // 光の移動速度
        const RAY_WIDTH = 4;   // 光の太さ

        let grid = [];
        let ray = null;
        let isPlaying = false;
        let lastTime = 0;

        // 右クリックメニューの禁止
        document.addEventListener('contextmenu', e => e.preventDefault());

        // グリッドの初期化（すべて空っぽにする）
        function initGrid() {
            grid = [];
            for (let r = 0; r < ROWS; r++) {
                let row = [];
                for (let c = 0; c < COLS; c++) {
                    row.push({ mirror: 0 }); // 0:なし, 1:'/', 2:'\'
                }
                grid.push(row);
            }
        }

        // ゲーム開始
        function startGame() {
            initGrid();
            // 光の初期化 (左上マスの中心から、右向きにスタート)
            ray = {
                x: SIZE / 2,
                y: SIZE / 2,
                dx: 1,
                dy: 0,
                history: []
            };
            isPlaying = true;
            btnStart.style.display = 'none';
            gameoverScreen.style.display = 'none';
            gameclearScreen.style.display = 'none';
            
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            isPlaying = false;
            gameoverScreen.style.display = 'flex';
            btnStart.style.display = 'block';
        }

        function gameClear() {
            isPlaying = false;
            gameclearScreen.style.display = 'flex';
            btnStart.style.display = 'block';
        }

        // マウスクリック処理（鏡の配置）
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const c = Math.floor(x / SIZE);
            const r = Math.floor(y / SIZE);

            // スタートマス(0,0)とゴールマス(14,14)には鏡を置けないようにする
            if ((r === 0 && c === 0) || (r === ROWS - 1 && c === COLS - 1)) return;

            if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                let cell = grid[r][c];
                if (e.button === 0) { // 左クリック '/'
                    cell.mirror = cell.mirror === 1 ? 0 : 1;
                } else if (e.button === 2) { // 右クリック '\'
                    cell.mirror = cell.mirror === 2 ? 0 : 2;
                }
                // ゲーム開始前でも鏡の配置が見えるように描画を更新
                if (!isPlaying) draw();
            }
        });

        function gameLoop(currentTime) {
            if (!isPlaying) return;
            const deltaTime = (currentTime - lastTime) / 1000;
            lastTime = currentTime;

            update();
            draw();

            requestAnimationFrame(gameLoop);
        }

        function update() {
            let nextX = ray.x + ray.dx * RAY_SPEED;
            let nextY = ray.y + ray.dy * RAY_SPEED;

            // 現在光がいるマスの中心座標
            let cx = Math.floor(ray.x / SIZE) * SIZE + SIZE / 2;
            let cy = Math.floor(ray.y / SIZE) * SIZE + SIZE / 2;

            // マスの中心をまたいだ瞬間の判定
            let crossed = false;
            if (ray.dx > 0 && ray.x <= cx && nextX >= cx) crossed = true;
            else if (ray.dx < 0 && ray.x >= cx && nextX <= cx) crossed = true;
            else if (ray.dy > 0 && ray.y <= cy && nextY >= cy) crossed = true;
            else if (ray.dy < 0 && ray.y >= cy && nextY <= cy) crossed = true;

            if (crossed) {
                ray.x = cx; ray.y = cy; // 中心にスナップ
                let r = Math.floor(cy / SIZE);
                let c = Math.floor(cx / SIZE);

                // ゴール判定 (右下のマスに到達したらクリア)
                if (r === ROWS - 1 && c === COLS - 1) {
                    gameClear();
                    return;
                }

                if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                    let cell = grid[r][c];
                    if (cell.mirror !== 0) {
                        let oldDx = ray.dx;
                        if (cell.mirror === 1) { // '/'
                            ray.dx = -ray.dy; ray.dy = -oldDx;
                        } else if (cell.mirror === 2) { // '\'
                            ray.dx = ray.dy; ray.dy = oldDx;
                        }
                        // 鏡は割れずにそのまま残る (cell.mirror = 0 は削除)
                    }
                }
                
                // 方向転換後の残りの移動量を適用
                let dist = Math.abs((ray.dx !== 0) ? (nextX - cx) : (nextY - cy));
                ray.x += ray.dx * dist;
                ray.y += ray.dy * dist;
            } else {
                ray.x = nextX;
                ray.y = nextY;
            }

            // 軌跡の記録（残像用）
            ray.history.push({ x: ray.x, y: ray.y });
            if (ray.history.length > 25) ray.history.shift();

            // 衝突判定（外枠の壁に出たらアウト）
            if (ray.x < 0 || ray.x > canvas.width || ray.y < 0 || ray.y > canvas.height) {
                gameOver();
            }
        }

        function draw() {
            // 背景クリア
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // グリッドとマスの描画
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let cx = c * SIZE;
                    let cy = r * SIZE;
                    let cell = grid[r][c];

                    // 特殊マスの色分け
                    if (r === 0 && c === 0) {
                        // スタートマス (緑)
                        ctx.fillStyle = 'rgba(0, 255, 100, 0.15)';
                        ctx.fillRect(cx, cy, SIZE, SIZE);
                    } else if (r === ROWS - 1 && c === COLS - 1) {
                        // ゴールマス (オレンジ)
                        ctx.fillStyle = 'rgba(255, 150, 0, 0.2)';
                        ctx.fillRect(cx, cy, SIZE, SIZE);
                    }

                    // グリッド線の描画
                    ctx.strokeStyle = 'rgba(0, 255, 204, 0.08)';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(cx, cy, SIZE, SIZE);

                    // 鏡の描画
                    if (cell.mirror !== 0) {
                        ctx.strokeStyle = '#ffffff';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        if (cell.mirror === 1) { // '/'
                            ctx.moveTo(cx + 6, cy + SIZE - 6);
                            ctx.lineTo(cx + SIZE - 6, cy + 6);
                        } else { // '\'
                            ctx.moveTo(cx + 6, cy + 6);
                            ctx.lineTo(cx + SIZE - 6, cy + SIZE - 6);
                        }
                        ctx.stroke();
                    }
                }
            }

            // スタート・ゴールのテキスト描画
            ctx.font = 'bold 10px Courier New';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#00ffcc';
            ctx.fillText('START', SIZE / 2, SIZE / 2);
            ctx.fillStyle = '#ff9600';
            ctx.fillText('GOAL', canvas.width - SIZE / 2, canvas.height - SIZE / 2);

            // 光線の描画（ゲーム中のみ）
            if (isPlaying && ray) {
                ctx.beginPath();
                ctx.strokeStyle = '#00ffcc';
                ctx.lineWidth = RAY_WIDTH;
                ctx.lineCap = 'round';
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#00ffcc';

                if (ray.history.length > 0) {
                    ctx.moveTo(ray.history[0].x, ray.history[0].y);
                    for (let i = 1; i < ray.history.length; i++) {
                        ctx.lineTo(ray.history[i].x, ray.history[i].y);
                    }
                    ctx.lineTo(ray.x, ray.y);
                }
                ctx.stroke();
                ctx.shadowBlur = 0; // シャドウのリセット
            }
        }

        // イベントリスナーの登録
        btnStart.addEventListener('click', startGame);
        restartButtons.forEach(btn => btn.addEventListener('click', startGame));

        // 初回起動時の描画
        initGrid();
        draw();
    </script>
</body>
</html>
