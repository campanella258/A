<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self-Destructive Ray</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #00ffcc;
            --panel-bg: #111;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            user-select: none;
        }

        h1 { margin: 10px 0 5px; font-size: 24px; text-shadow: 0 0 10px var(--text-color); }

        .container {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        #game-wrapper {
            position: relative;
            background-color: #000;
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            transition: filter 0.1s;
        }

        canvas { display: block; }

        .sidebar {
            width: 300px;
            background: var(--panel-bg);
            border: 1px solid #333;
            padding: 15px;
            font-size: 14px;
            display: flex;
            flex-direction: column;
        }

        .status-box { flex-grow: 1; overflow-y: auto; }
        .danger-text { color: #ff3366; font-weight: bold; }
        
        .rule-box {
            background: rgba(0, 255, 204, 0.1);
            border-left: 4px solid var(--text-color);
            padding: 10px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .controls { color: #aaa; font-size: 12px; margin-top: 10px; }

        #btn-start {
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-family: 'Courier New', Courier, monospace;
        }
        #btn-start:hover { background: #fff; }

        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 0, 0, 0.3);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            z-index: 10;
        }
    </style>
</head>
<body>

    <h1>Self-Destructive Ray</h1>

    <div class="container">
        <div id="game-wrapper">
            <canvas id="gameCanvas" width="540" height="540"></canvas>
            <div id="gameover" class="overlay">
                <h2 style="font-size: 40px; margin: 0; text-shadow: 0 0 20px red;">SYSTEM CRASH</h2>
                <p>光が壁に衝突しました</p>
                <button id="btn-restart" style="padding: 10px 20px; cursor:pointer;">REBOOT SYSTEM</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="rule-box">
                【生存プロトコル】<br>
                光を壁に当ててはならない。<br>
                鏡は光を反射すると砕け散り、<br>そのマスの<b>設定変数</b>を書き換える。
            </div>
            
            <div>[SCORE(生存数)]: <span id="ui-score" style="font-size:20px; color:#fff;">0</span></div>
            <hr style="border-color:#333; margin:15px 0;">
            
            <div><b>[MEMORY STATUS]</b></div>
            <div class="status-box" id="ui-status">
                <!-- パラメータの狂い具合がここに表示される -->
            </div>

            <div class="controls">
                <b>[操作方法]</b><br>
                <b>左クリック</b>: 鏡 [ ／ ] を配置<br>
                <b>右クリック</b>: 鏡 [ ＼ ] を配置<br>
                ※同クリックで消去/上書き
            </div>
            <button id="btn-start">BOOT GAME</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('game-wrapper');
        const uiScore = document.getElementById('ui-score');
        const uiStatus = document.getElementById('ui-status');
        const btnStart = document.getElementById('btn-start');
        const btnRestart = document.getElementById('btn-restart');
        const gameoverScreen = document.getElementById('gameover');

        // ゲーム定数
        const COLS = 15;
        const ROWS = 15;
        const SIZE = 36;
        
        // 変数パラメーター群の定義
        const paramDefs = [
            { id: 'speed', name: 'SYS_SPEED', init: 2.0, min: 1.0, max: 8.0, step: 0.8 },
            { id: 'hue', name: 'DRAW_HUE', init: 0, min: 0, max: 360, step: 45, loop: true },
            { id: 'invert', name: 'DRAW_INVERT', init: 0, min: 0, max: 100, step: 25 },
            { id: 'shake', name: 'CAM_SHAKE', init: 0, min: 0, max: 15, step: 3 },
            { id: 'thickness', name: 'RAY_WIDTH', init: 3, min: 1, max: 15, step: 3 },
            { id: 'glitch', name: 'GRID_GLITCH', init: 0, min: 0, max: 20, step: 4 },
            { id: 'pitch', name: 'AUD_PITCH', init: 1.0, min: 0.2, max: 2.0, step: 0.2 }
        ];

        let config = {};
        let grid = [];
        let rays = [];
        let isPlaying = false;
        let score = 0;
        let audioCtx = null;
        let lastTime = 0;

        // 右クリックメニューの禁止
        document.addEventListener('contextmenu', e => e.preventDefault());

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playGlassSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            // ピッチの狂いを適用
            osc.frequency.setValueAtTime(800 * config.pitch, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function generateGrid() {
            grid = [];
            let mutationsPool = [];
            // 各パラメータの「＋効果」「－効果」のペアを大量に生成
            for (let i = 0; i < (COLS * ROWS) / 2; i++) {
                let p = paramDefs[Math.floor(Math.random() * paramDefs.length)];
                mutationsPool.push({ id: p.id, val: p.step });
                mutationsPool.push({ id: p.id, val: -p.step });
            }
            // シャッフル
            mutationsPool.sort(() => Math.random() - 0.5);

            for (let r = 0; r < ROWS; r++) {
                let row = [];
                for (let c = 0; c < COLS; c++) {
                    row.push({
                        mirror: 0, // 0:なし, 1:'/', 2:'\'
                        mutation: mutationsPool.pop() || { id: 'speed', val: 0 }
                    });
                }
                grid.push(row);
            }
        }

        function resetConfig() {
            config = {};
            paramDefs.forEach(p => config[p.id] = p.init);
            updateStatusUI();
        }

        function applyMutation(mut) {
            const p = paramDefs.find(def => def.id === mut.id);
            if(p.loop) {
                config[p.id] = (config[p.id] + mut.val + p.max) % p.max;
            } else {
                config[p.id] = Math.max(p.min, Math.min(p.max, config[p.id] + mut.val));
            }
            updateStatusUI();
        }

        function updateStatusUI() {
            uiStatus.innerHTML = '';
            let isMessedUp = false;
            paramDefs.forEach(p => {
                const isAltered = config[p.id] !== p.init;
                const valStr = (config[p.id]).toFixed(1);
                if (isAltered) isMessedUp = true;
                const cssClass = isAltered ? 'danger-text' : '';
                uiStatus.innerHTML += `<div class="${cssClass}">${p.name}: ${valStr} ${isAltered ? '(!)' : ''}</div>`;
            });
            
            // 視覚エフェクトの適用
            wrapper.style.filter = `hue-rotate(${config.hue}deg) invert(${config.invert}%)`;
        }

        function spawnRay() {
            // 上下左右の端からスタート
            const edges = [
                { x: Math.floor(COLS/2)*SIZE+SIZE/2, y: 0, dx: 0, dy: 1 },
                { x: 0, y: Math.floor(ROWS/2)*SIZE+SIZE/2, dx: 1, dy: 0 }
            ];
            const start = edges[Math.random() > 0.5 ? 0 : 1];
            rays.push({ x: start.x, y: start.y, dx: start.dx, dy: start.dy, history: [] });
        }

        function startGame() {
            initAudio();
            generateGrid();
            resetConfig();
            rays = [];
            score = 0;
            isPlaying = true;
            btnStart.style.display = 'none';
            gameoverScreen.style.display = 'none';
            wrapper.style.transform = `translate(0px, 0px)`;
            uiScore.innerText = score;
            spawnRay();
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            isPlaying = false;
            gameoverScreen.style.display = 'flex';
        }

        // マウスクリック処理（鏡の配置）
        canvas.addEventListener('mousedown', (e) => {
            if (!isPlaying) return;
            const rect = canvas.getBoundingClientRect();
            // 揺れの影響を補正
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            
            const c = Math.floor(x / SIZE);
            const r = Math.floor(y / SIZE);

            if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                let cell = grid[r][c];
                if (e.button === 0) { // 左クリック '/'
                    cell.mirror = cell.mirror === 1 ? 0 : 1;
                } else if (e.button === 2) { // 右クリック '\'
                    cell.mirror = cell.mirror === 2 ? 0 : 2;
                }
            }
        });

        function gameLoop(currentTime) {
            if (!isPlaying) return;
            const deltaTime = (currentTime - lastTime) / 1000;
            lastTime = currentTime;

            update(deltaTime);
            draw();

            requestAnimationFrame(gameLoop);
        }

        function update(dt) {
            // 画面の揺れ
            if (config.shake > 0) {
                const sx = (Math.random() - 0.5) * config.shake * 2;
                const sy = (Math.random() - 0.5) * config.shake * 2;
                wrapper.style.transform = `translate(${sx}px, ${sy}px)`;
            }

            // 新しい光の追加（生存時間が延びるほどキツくなる）
            if (score > 0 && score % 20 === 0 && rays.length < Math.floor(score/20) + 1) {
                spawnRay();
            }

            for (let i = rays.length - 1; i >= 0; i--) {
                let ray = rays[i];
                let nextX = ray.x + ray.dx * config.speed;
                let nextY = ray.y + ray.dy * config.speed;

                // 光が現在いるマスの中心
                let cx = Math.floor(ray.x / SIZE) * SIZE + SIZE/2;
                let cy = Math.floor(ray.y / SIZE) * SIZE + SIZE/2;

                // 中心をまたいだか判定
                let crossed = false;
                if (ray.dx > 0 && ray.x <= cx && nextX >= cx) crossed = true;
                else if (ray.dx < 0 && ray.x >= cx && nextX <= cx) crossed = true;
                else if (ray.dy > 0 && ray.y <= cy && nextY >= cy) crossed = true;
                else if (ray.dy < 0 && ray.y >= cy && nextY <= cy) crossed = true;

                if (crossed) {
                    ray.x = cx; ray.y = cy; // 中心にスナップ
                    let r = Math.floor(cy / SIZE);
                    let c = Math.floor(cx / SIZE);

                    if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                        let cell = grid[r][c];
                        if (cell.mirror !== 0) {
                            // 反射ロジック
                            let oldDx = ray.dx;
                            if (cell.mirror === 1) { // '/'
                                ray.dx = -ray.dy; ray.dy = -oldDx;
                            } else if (cell.mirror === 2) { // '\'
                                ray.dx = ray.dy; ray.dy = oldDx;
                            }
                            
                            // 破壊と変異
                            applyMutation(cell.mutation);
                            cell.mirror = 0;
                            score++;
                            uiScore.innerText = score;
                            playGlassSound();
                        }
                    }
                    // 残りの距離を進める
                    let dist = Math.abs((ray.dx !== 0) ? (nextX - cx) : (nextY - cy));
                    ray.x += ray.dx * dist;
                    ray.y += ray.dy * dist;
                } else {
                    ray.x = nextX;
                    ray.y = nextY;
                }

                ray.history.push({x: ray.x, y: ray.y});
                if(ray.history.length > 20) ray.history.shift();

                // 衝突判定（外枠に出たらアウト）
                if (ray.x < 0 || ray.x > canvas.width || Math.floor(ray.y) < 0 || Math.floor(ray.y) > canvas.height) {
                    gameOver();
                }
            }
        }

        function draw() {
            // 残像クリア
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 調律（元に戻す力を持つ）マスを探す
            let tuningTargets = [];
            paramDefs.forEach(p => {
                if (config[p.id] !== p.init) {
                    // 狂いを戻す方向の mutation を探す
                    const needVal = config[p.id] > p.init ? -p.step : p.step;
                    tuningTargets.push({ id: p.id, val: needVal });
                }
            });

            // グリッドと鏡の描画
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let cx = c * SIZE;
                    let cy = r * SIZE;
                    let cell = grid[r][c];

                    // グリッチ表現（マスの位置が微妙にズレる）
                    let gx = cx + (Math.random()-0.5) * config.glitch;
                    let gy = cy + (Math.random()-0.5) * config.glitch;

                    // 調律マスの発光
                    let isTuning = false;
                    if (cell.mirror === 0) {
                        for (let t of tuningTargets) {
                            if (cell.mutation.id === t.id && cell.mutation.val === t.val) {
                                isTuning = true; break;
                            }
                        }
                    }

                    if (isTuning) {
                        ctx.fillStyle = `rgba(255, 50, 50, ${0.2 + Math.random() * 0.3})`;
                        ctx.fillRect(gx, gy, SIZE, SIZE);
                    } else {
                        ctx.strokeStyle = 'rgba(0, 255, 204, 0.1)';
                        ctx.strokeRect(gx, gy, SIZE, SIZE);
                    }

                    // 鏡の描画
                    if (cell.mirror !== 0) {
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        if (cell.mirror === 1) { // '/'
                            ctx.moveTo(gx + 4, gy + SIZE - 4);
                            ctx.lineTo(gx + SIZE - 4, gy + 4);
                        } else { // '\'
                            ctx.moveTo(gx + 4, gy + 4);
                            ctx.lineTo(gx + SIZE - 4, gy + SIZE - 4);
                        }
                        ctx.stroke();
                        
                        // 鏡のうしろに薄くアドレス表示（演出）
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                        ctx.font = '8px Courier New';
                        ctx.fillText(`0x${Math.floor(Math.random()*9999)}`, gx + 2, gy + SIZE - 2);
                    }
                }
            }

            // 光線の描画
            rays.forEach(ray => {
                ctx.beginPath();
                ctx.strokeStyle = '#00ffcc';
                ctx.lineWidth = config.thickness;
                ctx.lineCap = 'round';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00ffcc';

                if (ray.history.length > 0) {
                    ctx.moveTo(ray.history[0].x, ray.history[0].y);
                    for (let i = 1; i < ray.history.length; i++) {
                        ctx.lineTo(ray.history[i].x, ray.history[i].y);
                    }
                    ctx.lineTo(ray.x, ray.y);
                }
                ctx.stroke();
                ctx.shadowBlur = 0; // リセット
            });
        }

        btnStart.addEventListener('click', startGame);
        btnRestart.addEventListener('click', startGame);

        // 初期描画だけしておく
        generateGrid();
        draw();
    </script>
</body>
</html>
